services:
    sonarqube:
        image: sonarqube:community
        container_name: learnflow_sonarqube
        ports:
            - "9000:9000"
        depends_on:
            sonar_db:
                condition: service_healthy
        environment:
            SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
            SONAR_JDBC_USERNAME: sonar
            SONAR_JDBC_PASSWORD: sonar
        volumes:
            - sonarqube_data:/opt/sonarqube/data
            - sonarqube_logs:/opt/sonarqube/logs
            - sonarqube_extensions:/opt/sonarqube/extensions
        networks:
            - sonar_network

    sonar_db:
        image: postgres:17
        container_name: learnflow_sonarqube_postgres
        ports:
            - "5433:5432"
        command: postgres -c 'max_connections=300'
        volumes:
            - sonarqube_postgresql_data:/var/lib/postgresql/data
            - ../postgres/init/create_test_db.sql:/docker-entrypoint-initdb.d/create_test_db.sql:ro
        environment:
            POSTGRES_DB: sonar
            POSTGRES_USER: sonar
            POSTGRES_PASSWORD: sonar
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
            interval: 10s
            timeout: 5s
            retries: 10
        restart: unless-stopped
        networks:
            - sonar_network

    redis:
        image: redis:7-alpine
        container_name: learnflow_redis_local_deps
        ports:
            - "127.0.0.1:${REDIS_PORT:-6379}:6379"
        command: ["redis-server"]
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s
        restart: unless-stopped
        networks:
            - sonar_network

    migrate:
        build:
            context: ../../backend
            dockerfile: Dockerfile.dev
        container_name: learnflow_migrate_dev
        env_file:
            - ../../.env
            - ../../.env.test
        environment:
            STEPS: ${MIGRATION_STEPS:-0}
            DIRECTION: ${MIGRATION_DIRECTION:-up}
            DB_HOST: sonar_db
            DB_PORT: "5432"
        depends_on:
            sonar_db:
                condition: service_healthy
        networks:
            - sonar_network
        command: ["go", "run", "./cmd/migrate"]
        volumes:
            - ../../backend:/app
        profiles:
            - manual

volumes:
    sonarqube_data:
    sonarqube_logs:
    sonarqube_extensions:
    sonarqube_postgresql_data:


networks:
    sonar_network:
